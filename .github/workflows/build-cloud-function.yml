name: Build

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - name: Install system deps
        run: |
          apt-get update -qq
          apt-get install -y -qq curl libvips-dev
      - name: Setup Node
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
          apt-get install -y nodejs
          node -v
      - uses: actions/checkout@v4
      - name: npm install & bundle
        working-directory: cloudfunctions/generateFlashcards
        run: |
          npm install --omit=dev
          VIPS_VER=$(ls node_modules/sharp/vendor/ | head -1)
          if [ -n "$VIPS_VER" ]; then
            mkdir -p node_modules/sharp/vendor/$VIPS_VER/lib
            cp /usr/lib/x86_64-linux-gnu/libvips*.so* node_modules/sharp/vendor/$VIPS_VER/lib/ 2>/dev/null || true
            cp /usr/lib/x86_64-linux-gnu/libglib*.so* node_modules/sharp/vendor/$VIPS_VER/lib/ 2>/dev/null || true
            cp /usr/lib/x86_64-linux-gnu/libgobject*.so* node_modules/sharp/vendor/$VIPS_VER/lib/ 2>/dev/null || true
          fi
          echo "=== so count ==="
          find node_modules/sharp -name '*.so*' | wc -l
          node -e "require('sharp')" && echo "sharp OK"
      - name: Package
        working-directory: cloudfunctions/generateFlashcards
        run: zip -r node-modules.zip node_modules/
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: cloudfunctions/generateFlashcards/node-modules.zip
