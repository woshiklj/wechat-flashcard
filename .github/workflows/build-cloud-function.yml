name: Build

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: npm install
        working-directory: cloudfunctions/generateFlashcards
        run: npm install --omit=dev
      - name: Download full libvips vendor
        working-directory: cloudfunctions/generateFlashcards
        run: |
          VIPS_MINOR=$(node -e "console.log(require('sharp').versions.vips.split('.')[2])")
          VIPS_VER=$(ls node_modules/sharp/vendor 2>/dev/null | head -1 || echo "8.15.$VIPS_MINOR")
          echo "libvips version: $VIPS_VER"
          mkdir -p node_modules/sharp/vendor/$VIPS_VER/lib
          cd node_modules/sharp/vendor/$VIPS_VER/lib
          curl -L "https://github.com/lovell/sharp-libvips/releases/download/v$VIPS_VER/libvips-$VIPS_VER-linux-x64.tar.br" -o vendor.tar.br 2>/dev/null
          if [ -s vendor.tar.br ]; then
            brotli -d vendor.tar.br && tar xf vendor.tar && rm vendor.tar vendor.tar.br
            echo "Vendor extracted: $(find . -name '*.so*' | wc -l) .so files"
          else
            echo "WARNING: Could not download vendor, falling back to system libvips"
            sudo apt-get update -qq && sudo apt-get install -y -qq libvips-dev
            VIPS_LIB=$(ldd ../../../@img/sharp-linux-x64/lib/sharp-linux-x64.node | grep vips | awk '{print $3}')
            cp $VIPS_LIB . 2>/dev/null || true
          fi
          node -e "require('sharp'); console.log('sharp OK')"
      - name: Package
        working-directory: cloudfunctions/generateFlashcards
        run: zip -r node-modules.zip node_modules/
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: cloudfunctions/generateFlashcards/node-modules.zip
