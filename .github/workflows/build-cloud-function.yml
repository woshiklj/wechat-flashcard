name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install --omit=dev
        working-directory: cloudfunctions/generateFlashcards
      - run: node -e 'console.log(JSON.stringify(require("sharp").versions))'
        working-directory: cloudfunctions/generateFlashcards
      - run: find node_modules/sharp/vendor -name '*.so*' | wc -l
        working-directory: cloudfunctions/generateFlashcards
      - run: zip -r node-modules.zip node_modules/
        working-directory: cloudfunctions/generateFlashcards
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: cloudfunctions/generateFlashcards/node-modules.zip
