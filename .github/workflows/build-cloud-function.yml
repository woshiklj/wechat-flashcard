name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install sharp with bundled libvips
        working-directory: cloudfunctions/generateFlashcards
        run: |
          npm install --omit=dev
          npm ls sharp
          echo "--- vendor ---"
          find node_modules/sharp -name '*.so*' 2>/dev/null | wc -l
          find node_modules/@img -type d 2>/dev/null
          echo "--- libvips package ---"
          ls node_modules/@img/sharp-libvips-linux-x64/lib/ 2>/dev/null || echo "NOT FOUND"
          echo "--- trying force install ---"
          npm install @img/sharp-libvips-linux-x64 --no-save 2>/dev/null || true
          find node_modules/@img/sharp-libvips-linux-x64 -name '*.so*' 2>/dev/null | wc -l
          find node_modules/sharp -name '*.so*' 2>/dev/null | wc -l
      - name: Package
        working-directory: cloudfunctions/generateFlashcards
        run: zip -r node-modules.zip node_modules/
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: cloudfunctions/generateFlashcards/node-modules.zip
