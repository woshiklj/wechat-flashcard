name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: npm install (ignore system libvips)
        working-directory: cloudfunctions/generateFlashcards
        run: npm install --omit=dev
        env:
          SHARP_IGNORE_GLOBAL_LIBVIPS: true
      - name: Verify
        working-directory: cloudfunctions/generateFlashcards
        run: |
          echo "=== Sharp ==="
          node -e "console.log(JSON.stringify(require('sharp').versions))"
          echo "=== Vendor ==="
          find node_modules/sharp/vendor -name '*.so*' 2>/dev/null | wc -l
          find node_modules/sharp/vendor -maxdepth 3 -type f 2>/dev/null | head -20
          echo "=== @img ==="
          find node_modules/@img -name '*.node' -o -name '*.so*' 2>/dev/null
      - name: Package
        working-directory: cloudfunctions/generateFlashcards
        run: zip -r node-modules.zip node_modules/
      - uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: cloudfunctions/generateFlashcards/node-modules.zip
